apiVersion: v1
kind: ServiceAccount
metadata:
  name: beyla
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: beyla
rules:
  - apiGroups: [ "apps" ]
    resources: [ "replicasets" ]
    verbs: [ "list", "watch" ]
  - apiGroups: [ "" ]
    resources: [ "pods", "services", "nodes", "configmaps"]
    verbs: [ "list", "watch", "get" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: beyla
subjects:
  - kind: ServiceAccount
    name: beyla
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: beyla
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beyla-config
data:
  beyla-config.yml: |
    discovery:
      services:
       - k8s_namespace: demo
      survey:
       - k8s_namespace: "*"
    attributes:
      kubernetes:
        enable: true
      select:
        "*":
          include: [ "*" ]
          exclude: ["url_path"]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beyla
spec:
  selector:
    matchLabels:
      instrumentation: beyla
  template:
    metadata:
      labels:
        instrumentation: beyla
    spec:
      serviceAccountName: beyla
      hostPID: true  #important for app instrumentation
      hostNetwork: true #important for network metrics
      volumes:
        - name: beyla-config
          configMap:
            name: beyla-config
      containers:
        - name: beyla
          # image: grafana/beyla:2.6
          image: docker.io/mariomac/beyla:dev
          imagePullPolicy: Never
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /config
              name: beyla-config
          ports:
            - containerPort: 2345
              hostPort: 2345
              name: delve
            - containerPort: 9090
              name: http
            - containerPort: 6060
              name: pprof
          env:
            - name: BEYLA_TRACE_PRINTER
              value: text
            - name: BEYLA_KUBE_CLUSTER_NAME
              value: kind-cluster
            - name: BEYLA_LOG_LEVEL
              value: "debug"
            - name: BEYLA_CONFIG_PATH
              value: "/config/beyla-config.yml"
            - name: BEYLA_KUBE_METADATA_ENABLE
              value: "true"
            - name: OTEL_EBPF_NETWORK_SOURCE
              value: "tc"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://otlp-gateway-prod-eu-west-0.grafana.net/otlp"
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  key: otlp-headers
                  name: grafana-secret
            - name: BEYLA_OTEL_METRICS_FEATURES
              value: "application,application_span,application_service_graph"
            - name: BEYLA_PROMETHEUS_PORT
              value: "9090"
            - name: BEYLA_PROMETHEUS_FEATURES
              value: "application"
            - name: BEYLA_PROMETHEUS_TTL
              value: "1m"
            - name: BEYLA_OTEL_METRICS_TTL
              value: "1m"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
          resources: {}
            
---
kind: Service
apiVersion: v1
metadata:
  name: beyla
spec:
  selector:
    instrumentation: "beyla"
  ports:
    - port: 9090
      protocol: TCP
      targetPort: http
